<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Journey 3D</title>
    <link rel="stylesheet" href="./style.css" />
    
    <!-- Import Map for bare modules -->
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <!-- UI Container for HUD, Menus, etc., over the 3D Canvas -->
    <div id="ui-container">
      <div id="start-screen" class="screen">
        <h1 class="glitch" data-text="SPACE JOURNEY">SPACE JOURNEY</h1>
        <h2 id="high-score-display" class="hidden">HIGH SCORE: <span id="high-score-val">0</span></h2>
        <p id="loading-text">Loading Assets...</p>
        
        <div id="shop-container" class="hidden">
          <h3>UPGRADES</h3>
          <p>Scrap: <span id="scrap-val">0</span></p>
          <div class="upgrade-items">
            <button class="upgrade-btn" id="upg-health">Max Health (Lvl <span id="lvl-health">0</span>) - <span id="cost-health">1000</span> Scrap</button>
            <button class="upgrade-btn" id="upg-heat">Cooling (Lvl <span id="lvl-heat">0</span>) - <span id="cost-heat">1000</span> Scrap</button>
            <button class="upgrade-btn" id="upg-magnet">Magnet (Lvl <span id="lvl-magnet">0</span>) - <span id="cost-magnet">1000</span> Scrap</button>
          </div>
        </div>

        <button id="start-btn" class="hidden">Deploy Ship</button>
      </div>
      <div id="hud" class="screen hidden">
        <div class="stats-left">
          <div class="score">Score: <span id="score-val">0</span></div>
          <div class="heat-wrapper">
            <span>Heat:</span>
            <div id="heat-bar-bg">
              <div id="heat-bar"></div>
            </div>
          </div>
        </div>
        <div class="health">Health: <span id="health-val">100</span>%</div>
      </div>
      <div id="wave-banner" class="screen hidden wave-banner">
        <h2 id="wave-val">WAVE 1</h2>
      </div>
    </div>
    
    <!-- The Three.js Canvas will be appended to the body by the script -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
